<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利用規約RTA - ランキング</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      background: var(--yellow-bg);
      padding: 40px 32px 100px;
      display: flex;
      flex-direction: column;
    }

    .page-title {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      animation: fade-up 0.4s ease both;
    }

    .your-time-label {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 36px;
      animation: fade-up 0.4s 0.1s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .layout {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* ── ランキングリスト ── */
    .rank-list {
      flex: 3;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rank-item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      animation: fade-up 0.4s ease both;
      cursor: default;
      transition: filter 0.15s, transform 0.15s;
    }
    .rank-item:hover {
      filter: brightness(1.07);
      transform: translateX(4px);
    }
    .rank-item.rank-1  { background: #e53935; }
    .rank-item.rank-2  { background: #43a047; }
    .rank-item.rank-3  { background: #1e88e5; }
    .rank-item.rank-4  { background: #555; }
    .rank-item.rank-5  { background: #555; }
    .rank-item.rank-other { background: #777; }

    /* 自分の記録をハイライト */
    .rank-item.mine {
      outline: 3px solid #ffd700;
      outline-offset: 2px;
      filter: brightness(1.1);
    }

    /* ── 自分の記録カード ── */
    .my-record {
      background: #7ee87e;
      border-radius: var(--radius);
      padding: 32px 36px;
      text-align: center;
      flex: 2;
      min-width: 180px;
      animation: card-in 0.5s 0.3s cubic-bezier(0.34, 1.5, 0.64, 1) both;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }

    @keyframes card-in {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .my-record-label {
      font-size: 1rem;
      font-weight: 700;
      color: #1a6a1a;
      margin-bottom: 16px;
    }

    .my-rank-num {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--text-dark);
      line-height: 1;
    }

    .my-rank-unit {
      font-size: 1.6rem;
      font-weight: 700;
    }

    /* ── 戻るボタン ── */
    .back-wrap {
      position: fixed;
      bottom: 32px;
      right: 32px;
    }

    /* スクロールバー */
    .rank-list-scroll {
      max-height: 380px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }
    .rank-list-scroll::-webkit-scrollbar { width: 5px; }
    .rank-list-scroll::-webkit-scrollbar-track { background: transparent; }
    .rank-list-scroll::-webkit-scrollbar-thumb { background: #c8b870; border-radius: 3px; }
  </style>
</head>
<body>

  <h1 class="page-title">ランキング</h1>
  <p class="your-time-label" id="yourTimeLabel">利用規約に<span id="yourTimeSec" style="font-size:1.2em">--</span>秒で同意しました！</p>

  <div class="layout">
    <div class="rank-list">
      <div class="rank-list-scroll" id="rankListEl"></div>
    </div>

    <div class="my-record">
      <p class="my-record-label">あなたの記録</p>
      <p class="my-rank-num"><span id="myRankNum">--</span><span class="my-rank-unit">位</span></p>
    </div>
  </div>

  <div class="back-wrap">
    <button id="backBtn" class="btn-hex cyan" onclick="goBack()">戻る</button>
  </div>

  <script>
    // ── postMessageでデータ受け取り ──
    let myTime = 0, myGimmick = 0;

    function init(time, gmk) {
      myTime    = parseFloat(time || '0');
      myGimmick = parseInt(gmk   || '0', 10);

      document.getElementById('yourTimeSec').textContent = myTime > 0 ? myTime.toFixed(2) : '--';

      const MOCK_DATA = [
        { time:  3.12, gimmick: true  },
        { time: 10.45, gimmick: false },
        { time: 14.08, gimmick: true  },
        { time: 21.33, gimmick: true  },
        { time: 35.90, gimmick: false },
        { time: 42.17, gimmick: true  },
        { time: 58.02, gimmick: false },
        { time: 99.00, gimmick: false },
      ];

      let scores = [...MOCK_DATA];
      let myEntry = null;
      if (myTime > 0) {
        myEntry = { time: myTime, gimmick: myGimmick > 0, mine: true };
        scores.push(myEntry);
      }
      scores.sort((a, b) => a.time - b.time);

      const myRank = myEntry ? scores.findIndex(s => s === myEntry) + 1 : null;
      document.getElementById('myRankNum').textContent = myRank ?? '--';

      const RANK_COLORS = ['rank-1','rank-2','rank-3','rank-4','rank-5'];
      const listEl = document.getElementById('rankListEl');
      listEl.innerHTML = '';
      scores.forEach((s, i) => {
        const rank  = i + 1;
        const cls   = RANK_COLORS[i] ?? 'rank-other';
        const gTag  = s.gimmick ? 'ギミックあり' : 'ギミックなし';
        const mine  = s.mine ? ' mine' : '';
        const div   = document.createElement('div');
        div.className = `rank-item ${cls}${mine}`;
        div.style.animationDelay = (i * 0.06) + 's';
        div.textContent = `${rank}．${s.time.toFixed(2)}秒（${gTag}）`;
        listEl.appendChild(div);
      });

      if (myRank) {
        setTimeout(() => {
          const items = listEl.querySelectorAll('.rank-item');
          const myEl  = items[myRank - 1];
          if (myEl) myEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 600);
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'init') {
        init(e.data.time, e.data.gimmick);
      }
    });
    window.parent.postMessage({ type: 'ready', page: 'ranking' }, '*');

    function goBack() {
      window.parent.postMessage({ type: 'navigate', to: 'clear', time: myTime, gimmick: myGimmick }, '*');
    }
  </script>
</body>
</html>
